<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMBA Scanner</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
  .header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
  .header h1{font-size:20px;color:#58a6ff}
  .header .version{color:#8b949e;font-size:14px}
  .container{max-width:960px;margin:0 auto;padding:24px}
  .card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
  .card h2{font-size:16px;color:#c9d1d9;margin-bottom:16px;border-bottom:1px solid #21262d;padding-bottom:8px}
  label{display:block;font-size:13px;color:#8b949e;margin-bottom:4px}
  input[type=file],select,button{font-size:14px}
  input[type=file]{color:#c9d1d9}
  select{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 10px;width:200px}
  .row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px}
  .row>div{display:flex;flex-direction:column;gap:4px}
  .btn{background:#238636;color:#fff;border:none;border-radius:6px;padding:8px 20px;cursor:pointer;font-weight:600}
  .btn:hover{background:#2ea043}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .btn-danger{background:#da3633}
  .btn-danger:hover{background:#f85149}
  .btn-sm{padding:4px 12px;font-size:12px;border-radius:4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:8px 10px;color:#8b949e;border-bottom:1px solid #21262d;font-weight:600}
  td{padding:8px 10px;border-bottom:1px solid #21262d}
  .status{padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
  .status-pending{background:#1f2328;color:#8b949e}
  .status-running{background:#0c2d6b;color:#58a6ff}
  .status-completed{background:#0d2818;color:#3fb950}
  .status-failed{background:#3d1214;color:#f85149}
  .actions{display:flex;gap:6px;flex-wrap:wrap}
  .btn-link{background:none;color:#58a6ff;border:1px solid #30363d;border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px}
  .btn-link:hover{background:#1f2328}
  .empty{text-align:center;color:#484f58;padding:40px 0}
  .tabs{display:flex;gap:4px;margin-bottom:0;flex-wrap:wrap}
  .tab{display:flex;align-items:center;gap:6px;padding:6px 12px;background:#0d1117;border:1px solid #30363d;border-bottom:none;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;color:#8b949e}
  .tab:hover{background:#161b22}
  .tab.active{background:#161b22;color:#c9d1d9;border-color:#58a6ff}
  .tab .close{font-size:14px;line-height:1;opacity:0.6}
  .tab .close:hover{opacity:1;color:#f85149}
  .tab .dot{width:6px;height:6px;border-radius:50%;background:#8b949e}
  .tab .dot.running{background:#58a6ff}
  .tab .dot.completed{background:#3fb950}
  .tab .dot.failed{background:#f85149}
  .log-box{background:#0d1117;border:1px solid #21262d;border-radius:0 6px 6px 6px;padding:12px;font-family:'Cascadia Code','Fira Code',monospace;font-size:12px;height:300px;overflow:auto;white-space:pre;color:#8b949e;line-height:1.5}
  .log-placeholder{text-align:center;color:#484f58;padding:40px 0}
</style>
</head>
<body>

<div class="header">
  <h1>EMBA Scanner</h1>
  <div style="text-align:right">
    <div class="version" id="version">loading...</div>
    <div style="font-size:12px;color:#484f58" id="embaPath"></div>
  </div>
</div>

<div class="container">
  <div class="card">
    <h2>Upload Firmware</h2>
    <div class="row">
      <div style="flex:1">
        <label>Firmware file</label>
        <input type="file" id="fwFile">
      </div>
      <div>
        <label>Scan profile</label>
        <select id="profileSelect"><option value="">-- default --</option></select>
      </div>
      <div>
        <label>Modules (comma separated)</label>
        <input type="text" id="modulesInput" placeholder="e.g. S10,S25" style="background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:6px 10px;width:200px">
      </div>
    </div>
    <div class="row">
      <div style="flex:1"></div>
      <button class="btn" id="startBtn" onclick="startScan()">Start Scan</button>
    </div>
  </div>

  <div class="card">
    <h2>Tasks</h2>
    <div id="taskList"><div class="empty">No tasks</div></div>
  </div>

  <div class="card" style="padding-bottom:0">
    <h2>Live Log</h2>
    <div class="tabs" id="logTabs"></div>
    <div class="log-box" id="logBox"><div class="log-placeholder">No logs open</div></div>
  </div>
</div>

<script>
const API = '';
let activeTab = null;
const tabs = {};

function stripAnsi(str) {
  return str.replace(/\x1B\[[0-9;]*[a-zA-Z]/g, '');
}

function formatElapsed(seconds) {
  if (!seconds) return '';
  const s = Math.floor(seconds);
  if (s < 60) return s + 's';
  if (s < 3600) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return sec > 0 ? `${m}m ${sec}s` : `${m}m`;
  }
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  let result = `${h}h`;
  if (m > 0) result += ` ${m}m`;
  if (sec > 0) result += ` ${sec}s`;
  return result;
}

async function loadVersion() {
  try {
    const r = await fetch(`${API}/api/version`);
    const d = await r.json();
    document.getElementById('version').textContent = `v${d.version}`;
    document.getElementById('embaPath').textContent = d.emba_path;
  } catch(e) {
    document.getElementById('version').textContent = 'v?';
  }
}

async function loadProfiles() {
  try {
    const r = await fetch(`${API}/api/scan/profiles`);
    const list = await r.json();
    const sel = document.getElementById('profileSelect');
    list.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      sel.appendChild(opt);
    });
  } catch(e) {}
}

let currentPage = 1;
const PAGE_SIZE = 5;

async function loadTasks(page) {
  currentPage = page || currentPage;
  try {
    const r = await fetch(`${API}/api/scan?page=${currentPage}&page_size=${PAGE_SIZE}`);
    const data = await r.json();
    const tasks = data.items;
    const box = document.getElementById('taskList');
    if (!tasks.length) {
      box.innerHTML = '<div class="empty">No tasks</div>';
      return;
    }
    const totalPages = Math.ceil(data.total / PAGE_SIZE);
    box.innerHTML = `<table>
      <tr><th>Name</th><th>ID</th><th>Status</th><th>Elapsed</th><th>Created</th><th>Actions</th></tr>
      ${tasks.map(t => `<tr>
        <td style="font-family:monospace">${t.name}</td>
        <td style="font-family:monospace">${t.task_id}</td>
        <td><span class="status status-${t.status}">${t.status}</span></td>
        <td><span style="color:#8b949e;font-size:11px">${formatElapsed(t.elapsed_seconds)}</span></td>
        <td style="font-size:12px;color:#8b949e">${new Date(t.created_at).toLocaleString()}</td>
        <td class="actions">
          <button class="btn-link" onclick="openTab('${t.task_id}','${t.status}')">Logs</button>
          ${t.status === 'completed' ? `
            <a class="btn-link" href="${API}/api/scan/${t.task_id}/report" target="_blank">Report</a>
            <a class="btn-link" href="${API}/api/scan/${t.task_id}/sbom" target="_blank">SBOM</a>
          ` : ''}
          <button class="btn-link" style="color:#f85149" onclick="deleteTask('${t.task_id}')">Delete</button>
        </td>
      </tr>`).join('')}
    </table>
    ${totalPages > 1 ? `<div style="display:flex;justify-content:center;gap:8px;margin-top:12px">
      <button class="btn-link" onclick="loadTasks(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>Prev</button>
      <span style="color:#8b949e;font-size:13px;line-height:28px">${currentPage} / ${totalPages}</span>
      <button class="btn-link" onclick="loadTasks(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>Next</button>
    </div>` : ''}`;
  } catch(e) {}
}

async function startScan() {
  const file = document.getElementById('fwFile').files[0];
  if (!file) { alert('Please select a firmware file'); return; }

  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  const fd = new FormData();
  fd.append('firmware', file);

  const profile = document.getElementById('profileSelect').value;
  if (profile) fd.append('profile', profile);

  const modules = document.getElementById('modulesInput').value.trim();
  if (modules) fd.append('modules', modules);

  try {
    const r = await fetch(`${API}/api/scan`, { method: 'POST', body: fd });
    if (!r.ok) {
      const err = await r.json();
      alert(err.detail || 'Failed to start scan');
      return;
    }
    const d = await r.json();
    openTab(d.task_id, 'running');
    loadTasks();
  } catch(e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Start Scan';
  }
}

function openTab(taskId, status) {
  if (tabs[taskId]) {
    activateTab(taskId);
    return;
  }

  const tab = {
    logs: '',
    es: null,
    pollTimer: null,
    status: status
  };
  tabs[taskId] = tab;
  renderTabs();
  activateTab(taskId);

  if (status === 'running' || status === 'pending') {
    connectTabWS(taskId);
    pollTabStatus(taskId);
  } else {
    loadTabLogs(taskId);
  }
}

function connectTabWS(taskId) {
  const tab = tabs[taskId];
  if (!tab || tab.es) return;

  tab.es = new EventSource(`${API}/api/scan/${taskId}/events`);
  tab.es.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    tab.logs += `${stripAnsi(msg.message)}\n`;
    if (activeTab === taskId) {
      const box = document.getElementById('logBox');
      box.textContent = tab.logs;
      box.scrollTop = box.scrollHeight;
    }
    if (msg.type === 'completed') {
      tab.status = 'completed';
      loadTasks();
      closeTabWS(taskId);
      renderTabs();
    }
  };
  tab.es.onerror = () => {};
}

function closeTabWS(taskId) {
  const tab = tabs[taskId];
  if (!tab) return;
  if (tab.es) { tab.es.close(); tab.es = null; }
  if (tab.pollTimer) { clearInterval(tab.pollTimer); tab.pollTimer = null; }
}

function pollTabStatus(taskId) {
  const tab = tabs[taskId];
  if (!tab || tab.pollTimer) return;

  tab.pollTimer = setInterval(async () => {
    try {
      const r = await fetch(`${API}/api/scan/${taskId}`);
      const d = await r.json();
      loadTasks();
      if (d.status === 'completed' || d.status === 'failed') {
        tab.status = d.status;
        renderTabs();
        closeTabWS(taskId);
      }
    } catch(e) {}
  }, 3000);
}

async function loadTabLogs(taskId) {
  const tab = tabs[taskId];
  if (!tab) return;
  try {
    const r = await fetch(`${API}/api/scan/${taskId}/logs`);
    if (r.ok) {
      const text = await r.text();
      tab.logs = stripAnsi(text) + '\n';
    } else {
      tab.logs = 'Log file not found\n';
    }
  } catch(e) {
    tab.logs = 'Failed to load logs\n';
  }
  if (activeTab === taskId) {
    const box = document.getElementById('logBox');
    box.textContent = tab.logs;
    box.scrollTop = box.scrollHeight;
  }
}

function activateTab(taskId) {
  activeTab = taskId;
  renderTabs();
  const box = document.getElementById('logBox');
  box.textContent = tabs[taskId]?.logs || '';
  box.scrollTop = box.scrollHeight;
}

function closeTab(taskId) {
  closeTabWS(taskId);
  delete tabs[taskId];
  if (activeTab === taskId) {
    const keys = Object.keys(tabs);
    activeTab = keys.length > 0 ? keys[0] : null;
  }
  renderTabs();
  const box = document.getElementById('logBox');
  if (activeTab) {
    box.textContent = tabs[activeTab]?.logs || '';
    box.scrollTop = box.scrollHeight;
  } else {
    box.innerHTML = '<div class="log-placeholder">No logs open</div>';
  }
}

function renderTabs() {
  const container = document.getElementById('logTabs');
  container.innerHTML = Object.keys(tabs).map(id => {
    const tab = tabs[id];
    const dotClass = tab.status === 'running' || tab.status === 'pending' ? 'running' :
                     tab.status === 'completed' ? 'completed' :
                     tab.status === 'failed' ? 'failed' : '';
    const activeClass = activeTab === id ? ' active' : '';
    return `<div class="tab${activeClass}" onclick="activateTab('${id}')">
      <span class="dot ${dotClass}"></span>
      <span>${id}</span>
      <span class="close" onclick="event.stopPropagation();closeTab('${id}')">&times;</span>
    </div>`;
  }).join('');
}

async function deleteTask(taskId) {
  if (!confirm('Delete this task?')) return;
  try {
    await fetch(`${API}/api/scan/${taskId}`, { method: 'DELETE' });
    closeTab(taskId);
    const r = await fetch(`${API}/api/scan?page=${currentPage}&page_size=${PAGE_SIZE}`);
    const data = await r.json();
    if (!data.items.length && currentPage > 1) {
      loadTasks(currentPage - 1);
    } else {
      loadTasks(currentPage);
    }
  } catch(e) {}
}

loadVersion();
loadProfiles();
loadTasks();
</script>
</body>
</html>
